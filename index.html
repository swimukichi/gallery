<style>

    padding:3px 10px;transform:rotate(-2deg);text-decoration:none;transition:background .2s;cursor:pointer;
  }
  .stamp:hover{background:rgba(214,186,255,.22);}

  .filter-btn{

    color:#e0e0e0;background:transparent;border:none;border-bottom:1px solid transparent;
    cursor:pointer;padding:4px 0;transition:color .2s,border-color .2s;
  }
  .filter-btn:hover{color:#7b5ea7;}
  .filter-btn.active{color:#e6c364;border-bottom-color:#e6c364;}

  .lang-btn{
    font-family:'Space Grotesk',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;
    color:#99907e;background:none;border:none;cursor:pointer;transition:color .2s;
  }
  .lang-btn.active,.lang-btn:hover{color:#e6c364;}

  .card-overlay{
    position:absolute;inset:0;
    background:rgba(87,58,129,.25);

    display:flex;flex-direction:column;justify-content:center;align-items:center;
    text-align:center;padding:2rem;backdrop-filter:blur(4px);
  }

  .hero-number{

    font-size:clamp(4rem,12vw,9rem);color:#e6c364;opacity:.12;
    font-weight:200;letter-spacing:.1em;line-height:1;
    pointer-events:none;user-select:none;
  }

  #modal-overlay{
    display:none;position:fixed;inset:0;z-index:300;
    background:rgba(0,0,0,.9);backdrop-filter:blur(10px);
    align-items:center;justify-content:center;
  }
  #modal-overlay.open{display:flex;}
  #modal-box{
    background:#1c1b1b;border:1px solid #4d4637;
    max-width:860px;width:92vw;max-height:90vh;overflow-y:auto;
    display:grid;grid-template-columns:1fr 1fr;position:relative;
  }
  @media(max-width:640px){#modal-box{grid-template-columns:1fr;}}
  #modal-close{
    position:absolute;top:1rem;right:1rem;background:none;border:none;
    color:#99907e;cursor:pointer;font-size:.9rem;
    font-family:'Space Grotesk',monospace;letter-spacing:.1em;

  .ar-1\/1  { aspect-ratio: 1/1; }
  .ar-16\/9 { aspect-ratio: 16/9; }

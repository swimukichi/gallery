name: Update Note Articles

on:
  schedule:
    - cron: '0 0 * * *'  # 毎日午前9時（JST）に実行
  workflow_dispatch:      # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update note cards
        run: |
          python3 << 'EOF'
          import re, urllib.request, json

          URLS = [
            "https://note.com/swi0801/n/n0d077d5bdb68",
            "https://note.com/swi0801/n/n375a5539895d",
            "https://note.com/swi0801/n/naa4002d0faa5",
            "https://note.com/swi0801/n/n59cc7bf67399",
            "https://note.com/swi0801/n/nb4054b787398",
            "https://note.com/swi0801/n/na30e81d6bcf2",
          ]

          cards = ""
          for url in URLS:
            try:
              req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
              html = urllib.request.urlopen(req, timeout=10).read().decode("utf-8")
              title = re.search(r'<title>(.*?)</title>', html)
              title = title.group(1).replace("|note", "").strip() if title else "記事"
              cards += f'''          <a class="note-card" href="{url}" target="_blank" rel="noopener noreferrer">
              <span class="note-card-tag">domestic × mutation</span>
              <h3 class="note-card-title">{title}</h3>
              <span class="note-card-date"></span>
            </a>\n'''
            except:
              pass

          with open("index.html", "r", encoding="utf-8") as f:
            content = f.read()

            start_marker = '<!-- NOTE_START -->'
            end_marker = '<!-- NOTE_END -->'
            start_idx = content.index(start_marker) + len(start_marker)
            end_idx = content.index(end_marker)
            new_content = content[:start_idx] + '\n' + cards + '\n        ' + content[end_idx:]

          with open("index.html", "w", encoding="utf-8") as f:
            f.write(new_content)

          print("Done!")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "auto: update note cards"
          git push